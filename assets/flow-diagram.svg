<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" width="820" height="540">
  <defs>
    <clipPath id="clip-flow"><rect width="820" height="540" rx="8"/></clipPath>
  </defs>
  <g clip-path="url(#clip-flow)">
    <!-- Background -->
    <rect width="820" height="540" fill="#0D1117" rx="8"/>

    <!-- Title -->
    <text x="410" y="35" font-family="'Segoe UI','Helvetica Neue',sans-serif" font-size="18" fill="#C9D1D9" text-anchor="middle" font-weight="bold">Update-Everything — Execution Flow</text>

    <!-- Step 1: Self-Elevate -->
    <rect x="30" y="60" width="170" height="56" rx="10" fill="#161B22" stroke="#30363D"/>
    <text x="115" y="84" font-family="'Segoe UI',sans-serif" font-size="12" fill="#58A6FF" text-anchor="middle" font-weight="bold">1. Self-Elevate</text>
    <text x="115" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">UAC prompt if needed</text>

    <!-- Arrow 1→2 -->
    <line x1="200" y1="88" x2="228" y2="88" stroke="#30363D" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Step 2: Detection -->
    <rect x="230" y="60" width="170" height="56" rx="10" fill="#161B22" stroke="#30363D"/>
    <text x="315" y="84" font-family="'Segoe UI',sans-serif" font-size="12" fill="#58A6FF" text-anchor="middle" font-weight="bold">2. Detect Tools</text>
    <text x="315" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">Test-Command for each</text>

    <!-- Arrow 2→3 -->
    <line x1="400" y1="88" x2="428" y2="88" stroke="#30363D" stroke-width="2"/>

    <!-- Step 3: Package Managers -->
    <rect x="430" y="60" width="170" height="56" rx="10" fill="#161B22" stroke="#238636"/>
    <text x="515" y="84" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3FB950" text-anchor="middle" font-weight="bold">3. Package Managers</text>
    <text x="515" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">Scoop → Winget → Choco</text>

    <!-- Arrow 3→4 -->
    <line x1="600" y1="88" x2="628" y2="88" stroke="#30363D" stroke-width="2"/>

    <!-- Step 4: Windows -->
    <rect x="630" y="60" width="170" height="56" rx="10" fill="#161B22" stroke="#238636"/>
    <text x="715" y="84" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3FB950" text-anchor="middle" font-weight="bold">4. Windows</text>
    <text x="715" y="102" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">WU · Store · WSL · Defender</text>

    <!-- Second row connectors -->
    <line x1="715" y1="116" x2="715" y2="150" stroke="#30363D" stroke-width="2"/>

    <!-- Step 5: Dev Tools (wide box spanning row 2) -->
    <rect x="30" y="150" width="770" height="56" rx="10" fill="#161B22" stroke="#1F6FEB"/>
    <text x="415" y="174" font-family="'Segoe UI',sans-serif" font-size="12" fill="#58A6FF" text-anchor="middle" font-weight="bold">5. Development Tools</text>
    <text x="415" y="192" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">npm · pnpm · Bun · Deno · pip · uv · Rust · Cargo · Go · .NET · gh · VS Code · pipx · Poetry · Composer · Ruby · Oh My Posh · yt-dlp</text>

    <!-- Arrow 5→6 -->
    <line x1="415" y1="206" x2="415" y2="230" stroke="#30363D" stroke-width="2"/>

    <!-- Step 6: PowerShell Modules -->
    <rect x="230" y="230" width="370" height="56" rx="10" fill="#161B22" stroke="#1F6FEB"/>
    <text x="415" y="254" font-family="'Segoe UI',sans-serif" font-size="12" fill="#58A6FF" text-anchor="middle" font-weight="bold">6. PowerShell Modules</text>
    <text x="415" y="272" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">PSResourceGet (parallel) + PowerShellGet (legacy)</text>

    <!-- Arrow 6→7 -->
    <line x1="415" y1="286" x2="415" y2="310" stroke="#30363D" stroke-width="2"/>

    <!-- Step 7: Cleanup -->
    <rect x="230" y="310" width="370" height="56" rx="10" fill="#161B22" stroke="#DA3633"/>
    <text x="415" y="334" font-family="'Segoe UI',sans-serif" font-size="12" fill="#F85149" text-anchor="middle" font-weight="bold">7. System Cleanup</text>
    <text x="415" y="352" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">Temp · DNS · Recycle Bin · Crash Dumps · WER · DISM · DO Cache · Prefetch</text>

    <!-- Arrow 7→8 -->
    <line x1="415" y1="366" x2="415" y2="390" stroke="#30363D" stroke-width="2"/>

    <!-- Step 8: Summary -->
    <rect x="230" y="390" width="370" height="56" rx="10" fill="#161B22" stroke="#238636"/>
    <text x="415" y="414" font-family="'Segoe UI',sans-serif" font-size="12" fill="#3FB950" text-anchor="middle" font-weight="bold">8. Summary Report</text>
    <text x="415" y="432" font-family="'Segoe UI',sans-serif" font-size="10" fill="#8B949E" text-anchor="middle">Color-coded: ✓ Succeeded · ✗ Failed · ⚠ Skipped</text>

    <!-- Feature badges row -->
    <rect x="50" y="475" width="120" height="36" rx="18" fill="#1F6FEB22" stroke="#1F6FEB" stroke-width="1"/>
    <text x="110" y="498" font-family="'Segoe UI',sans-serif" font-size="11" fill="#58A6FF" text-anchor="middle">⚡ -FastMode</text>

    <rect x="190" y="475" width="120" height="36" rx="18" fill="#8957E522" stroke="#8957E5" stroke-width="1"/>
    <text x="250" y="498" font-family="'Segoe UI',sans-serif" font-size="11" fill="#BC8CFF" text-anchor="middle">🔍 -DryRun</text>

    <rect x="330" y="475" width="120" height="36" rx="18" fill="#3FB95022" stroke="#3FB950" stroke-width="1"/>
    <text x="390" y="498" font-family="'Segoe UI',sans-serif" font-size="11" fill="#3FB950" text-anchor="middle">🔁 -Parallel</text>

    <rect x="470" y="475" width="140" height="36" rx="18" fill="#F9F1A522" stroke="#D29922" stroke-width="1"/>
    <text x="540" y="498" font-family="'Segoe UI',sans-serif" font-size="11" fill="#E3B341" text-anchor="middle">🔑 -AutoElevate</text>

    <rect x="630" y="475" width="140" height="36" rx="18" fill="#DA363322" stroke="#DA3633" stroke-width="1"/>
    <text x="700" y="498" font-family="'Segoe UI',sans-serif" font-size="11" fill="#F85149" text-anchor="middle">📅 -Schedule</text>
  </g>
</svg>
